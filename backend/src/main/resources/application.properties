# ===================================================================
# Configuración de la aplicación - Pico y Placa API
# ===================================================================

spring.application.name=pico-y-placa-api

# ===================================================================
# Servidor
# ===================================================================
server.port=${SERVER_PORT:8080}

# ===================================================================
# Zona horaria de la aplicación
# ===================================================================
app.timezone=${APP_TIMEZONE:America/Guayaquil}

# ===================================================================
# Reglas de Pico y Placa - Configurables sin modificar código
# Formato: día_de_semana=dígito1,dígito2
# MONDAY=1, TUESDAY=2, ..., SUNDAY=7 (ISO-8601)
# ===================================================================
picoyplaca.rules.MONDAY=1,2
picoyplaca.rules.TUESDAY=3,4
picoyplaca.rules.WEDNESDAY=5,6
picoyplaca.rules.THURSDAY=7,8
picoyplaca.rules.FRIDAY=9,0

# ===================================================================
# Horarios de restricción (formato HH:mm)
# Se pueden definir múltiples franjas horarias
# ===================================================================
picoyplaca.schedules[0].start=07:00
picoyplaca.schedules[0].end=09:30
picoyplaca.schedules[1].start=16:00
picoyplaca.schedules[1].end=19:30

# ===================================================================
# Formato de placa (regex) - Ecuador: ABC-1234 o ABC-123
# ===================================================================
picoyplaca.plate-pattern=${PLATE_PATTERN:^[A-Z]{3}-?\\d{3,4}$}

# ===================================================================
# CORS
# ===================================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ===================================================================
# Swagger / OpenAPI
# ===================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===================================================================
# Actuator - solo health y info en producción
# ===================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ===================================================================
# Logging
# ===================================================================
logging.level.com.picoyplaca=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
